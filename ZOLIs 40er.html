<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>10 Umarmungen Gutschein</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      padding: 40px;
      color: #333;
    }

    h1 {
      font-size: 2.5em;
    }

    .counter {
      font-size: 2em;
      margin: 20px 0;
    }

    button {
      padding: 10px 20px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      background-color: #ff6f91;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff3f6c;
    }

    .teddies {
      font-size: 3em;
      margin-top: 30px;
      animation: hug 1s infinite alternate;
    }

    @keyframes hug {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); }
    }

    .note {
      margin-top: 40px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>🎉 Alles Gute zum 40er! 🎉</h1>
  <p>Du bekommst von mir:</p>
  <h2>❤️ 10 Umarmungen ❤️</h2>

  <div class="counter">
    Noch übrig: <span id="remaining">10</span>
  </div>

  <button onclick="useHug()">Eine Umarmung einlösen 🤗</button>

  <div class="teddies">
    🧸💞🧸
  </div>

  <div class="note">
    <p>Der Einlösen-Button darf nur von Barbara aktiviert werden.</p>
    <p>Umarmungen können ausschließlich persönlich eingelöst werden.</p>
    <p><em>Lieber Zoli, in deinem Fall gilt in Bezug auf die Umarmungen: auch nein heißt ja 😉</em></p>
  </div>

  <script>
    let remaining = 10;

    function useHug() {
      const password = prompt("🔒 Nur Barbara darf den Button verwenden!\nBitte Passwort eingeben, damit Zoli nicht heimlich Umarmungen verbraucht 😄");
      if (password !== "8421") {
        alert("Falsches Passwort! Nur Barbara darf hier klicken 😉");
        return;
      }
      if (remaining > 0) {
        remaining--;
        document.getElementById('remaining').textContent = remaining;
      } else {
        alert('Alle Umarmungen wurden schon eingelöst! 😄');
      }
    }
  </script>

</body>
</html>
